# Ruff configuration aligned with Home Assistant style
target-version = "py312"
line-length = 88

extend-exclude = ["custom_components/qobuz/connect/generated"]

[lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "SIM", "TCH"]
ignore = ["E501", "B008"]  # line length handled by formatter, etc.

[format]
quote-style = "double"