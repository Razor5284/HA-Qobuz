refresh_library:
  name: Refresh Library
  description: >-
    Refresh the Qobuz library data (playlists, favourites) immediately
    without waiting for the next poll interval.
  fields:
    config_entry:
      name: Config Entry
      description: >-
        Optional config entry ID to refresh. If omitted, all Qobuz
        entries are refreshed.
      required: false
      example: "abc123"
      selector:
        text:

set_streaming_quality:
  name: Set streaming quality (Connect)
  description: >-
    Set the maximum streaming quality for the active Qobuz Connect session
    (Qobuz format id, e.g. 6 = MP3 320, 7 = FLAC, 27 = Hi-Res). Requires an
    active Connect WebSocket session.
  fields:
    quality:
      name: Quality id
      description: Qobuz max streaming quality id sent to Connect.
      required: true
      example: 7
      selector:
        number:
          min: 5
          max: 27
          mode: box
    config_entry:
      name: Config Entry
      description: Optional config entry ID. If omitted, the first Qobuz entry is used.
      required: false
      example: "abc123"
      selector:
        text:

transfer_playback:
  name: Transfer Playback
  description: >-
    Transfer the current Qobuz playback to a Connect device
    (speaker, TV, etc.) by its device ID.
  fields:
    device_id:
      name: Device ID
      description: >-
        The numeric renderer ID of the target Connect device.
        Available device IDs are shown in the media player's
        extra state attributes.
      required: true
      example: "42"
      selector:
        text:
    config_entry:
      name: Config Entry
      description: >-
        Optional config entry ID. If omitted, the first available
        Qobuz Connect client is used.
      required: false
      example: "abc123"
      selector:
        text:
