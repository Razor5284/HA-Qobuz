name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Home Assistant 2026 requires Python 3.13 as minimum.
        # Testing only 3.13 avoids penalisation from older plugin versions
        # (pytest-homeassistant-custom-component) that pip resolves for 3.12.
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt || pip install pytest pytest-asyncio ruff pytest-homeassistant-custom-component aiohttp websockets protobuf
      - name: Lint with ruff
        run: ruff check .
      - name: Test with pytest
        run: pytest tests/ -v --tb=short